<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AquaAnalyser</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090b10;--bg2:#0e1018;--bg3:#13161f;
  --border:#1e2130;--border2:#2a2d3a;
  --text:#b8bdd0;--text2:#6a6f88;
  --green:#4caf72;--amber:#e8a020;--red:#e05040;--blue:#5080c0;
  --mono:'Share Tech Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:12px 12px 80px;display:flex;flex-direction:column;align-items:center}
.app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px}

/* TOP BAR */
.topbar{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.dot{width:9px;height:9px;border-radius:50%;background:#3a3d50;flex-shrink:0;transition:background .3s}
.dot.connecting{background:var(--amber);animation:blink 1s infinite}
.dot.connected{background:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.dev-name{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;flex:1}
.dev-name.on{color:var(--text)}
.btn{border-radius:8px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .15s;border:none}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:12px;letter-spacing:.05em;text-transform:uppercase}
.btn-connect{background:#1e3a5f;border:1px solid #2a5a9f!important;color:#6baed6}
.btn-connect:hover:not(:disabled){background:#264a7a}
.btn-connect.on{background:#1a3a28;border-color:#2a7a4a!important;color:var(--green)}
.btn-sel{background:var(--bg2);border:1px solid var(--border2)!important;color:var(--text2)}
.btn-sel:hover:not(:disabled){background:var(--bg3);color:var(--text)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:12px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:20px 16px;width:100%;max-width:480px}
.modal-title{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;text-align:center}
.ana-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.ana-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;font-family:var(--sans);text-align:left}
.ana-btn:hover{background:var(--bg3);border-color:var(--border2)}
.ana-btn.active{background:#0d1e14;border-color:#1a5a2a}
.ana-dot{width:8px;height:8px;border-radius:50%;background:#3a3d50;flex-shrink:0}
.ana-dot.ok{background:var(--green)}
.ana-name{font-size:14px;font-weight:600;color:var(--text)}
.ana-sub{font-size:11px;color:var(--text2);margin-top:1px}
.btn-close{width:100%;padding:12px;background:#1e2830;border:1px solid var(--border2);color:var(--text2);border-radius:10px;font-size:13px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:var(--sans)}
.btn-close:hover{background:#253040;color:var(--text)}

/* STATUS */
.status-card{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sc-ana{font-size:20px;font-weight:600;color:var(--text)}
.sc-unit{font-size:12px;color:var(--text2);margin-top:2px}
.sc-right{text-align:right}
.sc-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.badge-ok{background:#0d2a1a;color:var(--green);border:1px solid #1a5a2a}
.badge-none{background:var(--bg2);color:#4a4d60;border:1px solid var(--border)}

/* RESULT */
.result-card{background:#0d1e14;border:1px solid #1a4a2a;border-radius:14px;padding:14px 16px;display:none;flex-direction:column;gap:10px}
.result-card.show{display:flex}
.result-top{display:flex;align-items:center;gap:12px}
.result-left{flex:1}
.result-label{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.result-row{display:flex;align-items:baseline;gap:8px}
.rval{font-family:var(--mono);font-size:36px;letter-spacing:-.02em}
.runit{font-size:13px;color:#5a8a6a}
.rana{font-size:12px;color:var(--text2);margin-top:3px}
.result-right{text-align:right}
.seuil-lbl{font-size:11px;color:#3a5a48;margin-bottom:4px}
.sbadge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500}
.sb-ok  {background:#0d2a1a;color:var(--green);border:1px solid #1a5a2a}
.sb-warn{background:#2a1e0a;color:var(--amber);border:1px solid #5a3a0a}
.sb-bad {background:#2a0d0d;color:var(--red);  border:1px solid #5a1a1a}
.result-gps{display:flex;align-items:center;justify-content:space-between;gap:10px}
.gps-txt{font-family:var(--mono);font-size:11px;color:var(--text2);flex:1;word-break:break-all}
.btn-gps{background:#1a2840;border:1px solid #2a4070!important;color:#6090c0;border-radius:8px;padding:8px 14px;font-size:12px;white-space:nowrap;cursor:pointer;font-family:var(--sans)}
.btn-gps:hover{background:#203550}
.btn-gps.saved{background:#1a3a28;border-color:#2a5a3a!important;color:var(--green)}

/* TERMINAL */
.term-wrap{background:#070910;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.term-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.term-title{font-size:11px;color:#3a3d50;text-transform:uppercase;letter-spacing:.1em}
.btn-ttog{font-size:11px;color:#3a3d50;background:none;border:none;cursor:pointer;font-family:var(--sans);text-transform:uppercase;letter-spacing:.05em}
.btn-ttog:hover{color:var(--text2)}
.terminal{font-family:var(--mono);font-size:12.5px;line-height:1.65;color:#c8a84a;padding:10px 13px;height:220px;overflow-y:auto;transition:height .2s}
.terminal.coll{height:0;padding-top:0;padding-bottom:0}
.terminal::-webkit-scrollbar{width:3px}
.terminal::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}
.tl{word-break:break-all;margin-bottom:1px}
.tl.dim{color:#4a4730}.tl.ok{color:var(--green)}.tl.warn{color:#e07030}.tl.info{color:var(--blue)}.tl.res{color:#fff;font-weight:bold}
.cursor{display:inline-block;width:7px;height:13px;background:#c8a84a;vertical-align:text-bottom;animation:blink 1s step-end infinite}

/* COMMANDS */
.cmd-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px;display:flex;flex-direction:column;gap:9px}
.cmd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.cmd{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .12s;font-family:var(--sans)}
.cmd:active:not(:disabled){transform:scale(.93)}
.cmd-key{font-size:18px;font-weight:500;color:#b0b5c8;font-family:var(--mono)}
.cmd-desc{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.cmd.g .cmd-key{color:var(--green)}.cmd.g{background:#0d1e14;border-color:#1a4a2a}
.cmd.r .cmd-key{color:var(--red)  }.cmd.r{background:#1a0d0d;border-color:#4a1a1a}
.btn-enter{width:100%;padding:13px;background:#131826;border:1px solid var(--border2);border-radius:10px;color:#4a6090;font-size:13px;font-family:var(--sans);font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.btn-enter.active{background:#1a2850;border-color:#3050a0;color:#80a8e0;animation:glow 1.5s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(80,120,200,0)}50%{box-shadow:0 0 14px 2px rgba(80,120,200,.2)}}
.btn-enter:active:not(:disabled){transform:scale(.98)}
.eico{font-size:20px}

/* HISTORY */
.history-section{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;overflow:hidden}
.hist-bar{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.hist-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
.hist-btns{display:flex;gap:8px}
.btn-exp{background:#1a2830;border:1px solid var(--border2);color:#5090c0;border-radius:6px;padding:5px 11px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:var(--sans)}
.btn-exp:hover{background:#203040}
.btn-clrh{background:#2a1515;border:1px solid #5a2020;color:#a05050;border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:var(--sans)}
.hist-list{max-height:280px;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:6px}
.hist-list.hidden{display:none}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:grid;grid-template-columns:1fr auto;gap:2px 10px;align-items:start}
.hi-a{font-size:13px;font-weight:600;color:var(--text)}
.hi-v{font-family:var(--mono);font-size:13px;text-align:right}
.hi-d{font-size:11px;color:var(--text2)}
.hi-g{font-family:var(--mono);font-size:10px;color:#3a4a60;text-align:right}
.hist-empty{padding:16px;text-align:center;font-size:12px;color:#3a3d50}

/* NOTICE */
.notice{background:#1a1500;border:1px solid #3a3000;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.7;color:#906010;display:none}
.notice.show{display:block}
.notice strong{color:#c09020}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="dot" id="dot"></div>
  <span class="dev-name" id="devname">AquaAnalyser</span>
  <button class="btn btn-sm btn-sel" id="btnSel" onclick="openModal()" disabled>Analyte ▾</button>
  <button class="btn btn-sm btn-connect" id="btnConn" onclick="toggleConnect()">Connecter</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-title">Choisir l'analyse</div>
    <div class="ana-grid" id="anaGrid"></div>
    <button class="btn-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<div class="status-card">
  <div>
    <div class="sc-ana"  id="scName">—</div>
    <div class="sc-unit" id="scUnit">—</div>
  </div>
  <div class="sc-right">
    <div class="sc-label">Étalonnage</div>
    <div class="badge badge-none" id="calibBadge">Non effectué</div>
  </div>
</div>

<div class="result-card" id="resultCard">
  <div class="result-top">
    <div class="result-left">
      <div class="result-label">Mesure</div>
      <div class="result-row">
        <span class="rval" id="rVal">—</span>
        <span class="runit" id="rUnit"></span>
      </div>
      <div class="rana" id="rName"></div>
    </div>
    <div class="result-right">
      <div class="seuil-lbl" id="seuilRef"></div>
      <div class="sbadge sb-ok" id="seuilBadge">—</div>
    </div>
  </div>
  <div class="result-gps">
    <div class="gps-txt" id="gpsTxt">GPS non capturé</div>
    <button class="btn-gps" id="btnGps" onclick="saveWithGPS()">📍 Enregistrer</button>
  </div>
</div>

<div class="term-wrap">
  <div class="term-bar">
    <span class="term-title">Console</span>
    <button class="btn-ttog" onclick="toggleTerm()" id="ttogBtn">Réduire</button>
  </div>
  <div class="terminal" id="term"></div>
</div>

<div class="cmd-section">
  <div class="cmd-grid">
    <button class="cmd"   id="btnC" disabled onclick="send('C')"><span class="cmd-key">C</span><span class="cmd-desc">Étalonner</span></button>
    <button class="cmd g" id="btnM" disabled onclick="send('M')"><span class="cmd-key">M</span><span class="cmd-desc">Mesurer</span></button>
    <button class="cmd"   id="btnD" disabled onclick="send('D')"><span class="cmd-key">D</span><span class="cmd-desc">Diag</span></button>
    <button class="cmd r" id="btnR" disabled onclick="send('R')"><span class="cmd-key">R</span><span class="cmd-desc">Effacer</span></button>
  </div>
  <button class="btn-enter" id="btnEnter" disabled onclick="send('\r')">
    <span class="eico">↵</span><span id="enterLabel">Entrée</span>
  </button>
</div>

<div class="history-section">
  <div class="hist-bar" onclick="toggleHist()">
    <span class="hist-title" id="histTitle">Historique (0)</span>
    <div class="hist-btns" onclick="event.stopPropagation()">
      <button class="btn-exp"  onclick="exportCSV()">Export CSV</button>
      <button class="btn-clrh" onclick="clearHist()">Effacer</button>
    </div>
  </div>
  <div class="hist-list hidden" id="histList"></div>
</div>

<div class="notice" id="nobleNotice">
  <strong>Web Bluetooth non disponible.</strong><br>
  Ouvrir dans <strong>Chrome sur Android</strong> (v56+) via HTTPS.<br>
  Firefox et Safari ne supportent pas Web Bluetooth.
</div>

</div>
<script>
// ── Analytes (miroir du sketch ESP32) ────────────────────────────
const ANALYTES=[
  {idx:0,id:'no2', name:'NO2',      unit:'mg/L',n:9 },
  {idx:1,id:'ph',  name:'pH',       unit:'pH',  n:9 },
  {idx:2,id:'nh4', name:'NH4',      unit:'mg/L',n:9 },
  {idx:3,id:'no3', name:'NO3',      unit:'mg/L',n:10},
  {idx:4,id:'po4s',name:'PO4-sensi',unit:'mg/L',n:9 },
  {idx:5,id:'po4k',name:'PO4-koi',  unit:'mg/L',n:9 },
  {idx:6,id:'sio2',name:'SiO2',     unit:'mg/L',n:9 },
  {idx:7,id:'fe',  name:'Fe',       unit:'mg/L',n:9 },
  {idx:8,id:'cu',  name:'Cu',       unit:'mg/L',n:9 },
  {idx:9,id:'o2',  name:'O2',       unit:'mg/L',n:7 },
];

// Seuils [normal_max, élevé_max] — null = logique spéciale
const THR={
  no2:[0.1,0.5],nh4:[0.5,1.5],no3:[10,50],
  po4s:[0.5,1.0],po4k:[2.0,5.0],sio2:[2.0,4.0],
  fe:[0.3,1.0],cu:[0.2,0.5],o2:[5,8],ph:null
};

// ── BLE ──────────────────────────────────────────────────────────
const NUS_SVC="6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_TX ="6e400003-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_RX ="6e400002-b5a3-f393-e0a9-e50e24dcca9e";

let bleDevice=null,rxChar=null,connected=false,rxBuf="";
let calibSt=Array(10).fill(0),curIdx=0,curResult=null;
let histOpen=false,termOpen=true;

// ── Terminal ──────────────────────────────────────────────────────
const term=document.getElementById('term');
function tlog(t,c=''){if(!t.trim())return;const d=document.createElement('div');d.className='tl '+c;d.textContent=t;term.appendChild(d);term.scrollTop=term.scrollHeight;}
function lcls(t){
  if(t.startsWith('RESULT:')||t.includes('>> ')) return 'res';
  if(/OK|COMPLET|Sauvegarde/.test(t)) return 'ok';
  if(/!!|Non-monotone|Erreur/.test(t)) return 'warn';
  if(/^=|\[C|\[M|\[D|^---/.test(t)) return 'info';
  if(t.startsWith('  ')) return 'dim';
  return '';
}
function toggleTerm(){termOpen=!termOpen;term.classList.toggle('coll',!termOpen);document.getElementById('ttogBtn').textContent=termOpen?'Réduire':'Agrandir';}

// ── BLE parsing ───────────────────────────────────────────────────
function onNotify(e){
  rxBuf+=new TextDecoder().decode(e.target.value);
  let nl;
  while((nl=rxBuf.indexOf('\n'))!==-1){
    const line=rxBuf.slice(0,nl).trimEnd();
    rxBuf=rxBuf.slice(nl+1);
    parseLine(line);
  }
}

function parseLine(line){
  if(line==='WAIT_ENTER'){
    document.getElementById('btnEnter').classList.add('active');
    document.getElementById('enterLabel').textContent='Confirmer / Lancer acquisition';
    return;
  }
  if(line==='MENU_READY'){
    document.getElementById('btnEnter').classList.remove('active');
    document.getElementById('enterLabel').textContent='Entrée';
    return;
  }
  // ANA:index:id:name:unit:n:calibOK
  if(line.startsWith('ANA:')){
    const p=line.slice(4).split(':');
    if(p.length>=6){
      curIdx=parseInt(p[0]);
      updateStatus(p[2],p[3],p[4],p[5]==='1');
      refreshGrid();
    }
    return;
  }
  // CALIB_ALL:0,1,...
  if(line.startsWith('CALIB_ALL:')){
    calibSt=line.slice(10).split(',').map(Number);
    refreshGrid();
    return;
  }
  // RESULT:val:unit:name
  if(line.startsWith('RESULT:')){
    const p=line.slice(7).split(':');
    if(p.length>=3){
      curResult={val:parseFloat(p[0]),unit:p[1],name:p[2],id:ANALYTES[curIdx]?.id||''};
      showResult(curResult);
    }
    return;
  }
  tlog(line,lcls(line));
}

// ── Résultat ──────────────────────────────────────────────────────
function showResult(r){
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('rVal').textContent=r.val.toFixed(4);
  document.getElementById('rUnit').textContent=r.unit;
  document.getElementById('rName').textContent=r.name;
  document.getElementById('rVal').style.color=vColor(r);
  const thr=THR[r.id];
  const sb=document.getElementById('seuilBadge');
  const sl=document.getElementById('seuilRef');
  if(thr){
    sl.textContent=`Seuil ${thr[0]} / ${thr[1]} ${r.unit}`;
    if(r.val<=thr[0]){sb.textContent='Normal';  sb.className='sbadge sb-ok';}
    else if(r.val<=thr[1]){sb.textContent='Élevé'; sb.className='sbadge sb-warn';}
    else{sb.textContent='Dépassé';sb.className='sbadge sb-bad';}
  }else if(r.id==='ph'){
    sl.textContent='pH optimal 7.8–8.4';
    const v=r.val;
    if(v>=7.8&&v<=8.4){sb.textContent='Optimal';   sb.className='sbadge sb-ok';}
    else if(v>=7.4&&v<=9.0){sb.textContent='Acceptable';sb.className='sbadge sb-warn';}
    else{sb.textContent='Hors plage';sb.className='sbadge sb-bad';}
  }
  document.getElementById('gpsTxt').textContent='GPS non capturé';
  const bg=document.getElementById('btnGps');
  bg.textContent='📍 Enregistrer';bg.className='btn-gps';bg.disabled=false;bg.onclick=saveWithGPS;
}

function vColor(r){
  const t=THR[r.id];if(!t)return'#a0c0e8';
  if(r.val<=t[0])return'#4caf72';
  if(r.val<=t[1])return'#e8a020';
  return'#e05040';
}

async function saveWithGPS(){
  const btn=document.getElementById('btnGps');
  btn.textContent='⏳ GPS...';btn.disabled=true;
  let lat=null,lon=null,acc=null;
  try{
    const pos=await new Promise((res,rej)=>
      navigator.geolocation
        ?navigator.geolocation.getCurrentPosition(res,rej,{timeout:12000,enableHighAccuracy:true})
        :rej('no_geo')
    );
    lat=pos.coords.latitude;lon=pos.coords.longitude;acc=Math.round(pos.coords.accuracy);
    document.getElementById('gpsTxt').textContent=`${lat.toFixed(6)}, ${lon.toFixed(6)} (±${acc}m)`;
  }catch(e){document.getElementById('gpsTxt').textContent='GPS indisponible';}
  if(curResult)saveMeas(curResult,lat,lon,acc);
  btn.textContent='✓ Sauvegardé';btn.className='btn-gps saved';btn.disabled=false;btn.onclick=null;
  refreshHist();
}

// ── Historique (localStorage) ─────────────────────────────────────
const LS='aquaanalyser_v1';
function getHist(){try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch{return[];}}
function saveMeas(r,lat,lon,acc){
  const h=getHist();
  h.unshift({date:new Date().toISOString(),analyte:r.name,id:r.id,val:r.val,unit:r.unit,lat,lon,acc});
  localStorage.setItem(LS,JSON.stringify(h.slice(0,500)));
}

function refreshHist(){
  const h=getHist();
  document.getElementById('histTitle').textContent=`Historique (${h.length})`;
  const list=document.getElementById('histList');
  if(!h.length){list.innerHTML='<div class="hist-empty">Aucune mesure enregistrée</div>';return;}
  list.innerHTML=h.slice(0,60).map(m=>{
    const d=new Date(m.date);
    const dt=d.toLocaleDateString('fr')+' '+d.toLocaleTimeString('fr');
    const gps=m.lat?`${m.lat.toFixed(5)},${m.lon.toFixed(5)}`:'—';
    const col=m.val<0?'#6a6f88':'#c8cdd8';
    const vt=m.val<0?'Err':m.val.toFixed(4)+' '+m.unit;
    return`<div class="hist-item"><span class="hi-a">${m.analyte}</span><span class="hi-v" style="color:${col}">${vt}</span><span class="hi-d">${dt}</span><span class="hi-g">${gps}</span></div>`;
  }).join('');
}

function toggleHist(){histOpen=!histOpen;document.getElementById('histList').classList.toggle('hidden',!histOpen);if(histOpen)refreshHist();}
function clearHist(){if(!confirm('Effacer tout l\'historique ?'))return;localStorage.removeItem(LS);refreshHist();}

function exportCSV(){
  const h=getHist();
  if(!h.length){alert('Aucune mesure enregistrée.');return;}
  const hdr='Date,Analyte,ID,Valeur,Unité,Latitude,Longitude,Précision_m';
  const rows=h.map(m=>`"${m.date}","${m.analyte}","${m.id}",${m.val},"${m.unit}",${m.lat??''},${m.lon??''},${m.acc??''}`);
  const blob=new Blob([hdr+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`aqua_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Sélecteur d'analyte ───────────────────────────────────────────
function buildGrid(){
  document.getElementById('anaGrid').innerHTML=ANALYTES.map(a=>`
    <button class="ana-btn${a.idx===curIdx?' active':''}" id="ab${a.idx}" onclick="selAna(${a.idx})">
      <div class="ana-dot${calibSt[a.idx]?' ok':''}" id="ad${a.idx}"></div>
      <div><div class="ana-name">${a.name}</div><div class="ana-sub">${a.unit} · ${a.n} val.</div></div>
    </button>`).join('');
}

function refreshGrid(){
  ANALYTES.forEach(a=>{
    const d=document.getElementById('ad'+a.idx);
    const b=document.getElementById('ab'+a.idx);
    if(d)d.className='ana-dot'+(calibSt[a.idx]?' ok':'');
    if(b)b.className='ana-btn'+(a.idx===curIdx?' active':'');
  });
}

function openModal(){buildGrid();document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOut(e){if(e.target.id==='modal')closeModal();}

async function selAna(idx){
  closeModal();
  if(!rxChar||!connected)return;
  await send('S'+idx);
}

// ── UI helpers ────────────────────────────────────────────────────
function updateStatus(name,unit,n,isCalib){
  document.getElementById('scName').textContent=name;
  document.getElementById('scUnit').textContent=`${unit} — ${n} valeurs`;
  const b=document.getElementById('calibBadge');
  b.textContent=isCalib?'Effectué ✓':'Non effectué';
  b.className='badge '+(isCalib?'badge-ok':'badge-none');
}

function setConn(state,name){
  connected=(state==='connected');
  document.getElementById('dot').className='dot '+state;
  const dn=document.getElementById('devname');
  const bc=document.getElementById('btnConn');
  const bs=document.getElementById('btnSel');
  const ids=['btnC','btnM','btnD','btnR','btnEnter'];
  if(state==='connected'){
    dn.textContent=name||'AquaAnalyser';dn.className='dev-name on';
    bc.textContent='Déconnecter';bc.className='btn btn-sm btn-connect on';bc.disabled=false;
    bs.disabled=false;
    ids.forEach(id=>document.getElementById(id).disabled=false);
    const c=document.createElement('span');c.className='cursor';c.id='tcur';term.appendChild(c);term.scrollTop=term.scrollHeight;
  }else{
    dn.textContent=state==='connecting'?'Connexion...':'AquaAnalyser';dn.className='dev-name';
    bc.textContent=state==='connecting'?'...':'Connecter';bc.className='btn btn-sm btn-connect';bc.disabled=(state==='connecting');
    bs.disabled=true;
    ids.forEach(id=>document.getElementById(id).disabled=true);
    document.getElementById('btnEnter').classList.remove('active');
    document.getElementById('enterLabel').textContent='Entrée';
    const c=document.getElementById('tcur');if(c)c.remove();
  }
}

// ── BLE connect/send ──────────────────────────────────────────────
async function toggleConnect(){
  if(connected){bleDevice?.gatt?.disconnect();return;}
  if(!navigator.bluetooth){document.getElementById('nobleNotice').classList.add('show');return;}
  setConn('connecting');
  try{
    bleDevice=await navigator.bluetooth.requestDevice({filters:[{services:[NUS_SVC]}]});
    bleDevice.addEventListener('gattserverdisconnected',()=>{setConn('disconnected');rxChar=null;tlog('Déconnecté.','warn');});
    const srv=await bleDevice.gatt.connect();
    const svc=await srv.getPrimaryService(NUS_SVC);
    const tx =await svc.getCharacteristic(NUS_TX);
    rxChar   =await svc.getCharacteristic(NUS_RX);
    await tx.startNotifications();
    tx.addEventListener('characteristicvaluechanged',onNotify);
    setConn('connected',bleDevice.name||'AquaAnalyser');
    tlog('Connecté — '+(bleDevice.name||'AquaAnalyser'),'ok');
    await send('\n');
  }catch(e){setConn('disconnected');tlog('Erreur : '+e.message,'warn');}
}

async function send(cmd){
  if(!rxChar||!connected)return;
  try{
    await rxChar.writeValueWithoutResponse(new TextEncoder().encode(cmd+'\n'));
    if(cmd!=='\r'&&cmd!=='\n'){
      document.getElementById('btnEnter').classList.remove('active');
      document.getElementById('enterLabel').textContent='Entrée';
    }
  }catch(e){tlog('Erreur envoi : '+e.message,'warn');}
}

// ── Init ──────────────────────────────────────────────────────────
if(!navigator.bluetooth){tlog('Web Bluetooth non détecté — Chrome Android requis (HTTPS).','warn');}
else{tlog('AquaAnalyser — prêt.','info');tlog('Appuyez sur Connecter.','dim');}
refreshHist();
updateStatus('—','—','—',false);
</script>
