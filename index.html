<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AquaAnalyser</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090b10;--bg2:#0e1018;--bg3:#13161f;
  --bd:#1e2130;--bd2:#2a2d3a;
  --tx:#b8bdd0;--tx2:#6a6f88;
  --green:#4caf72;--amber:#e8a020;--red:#e05040;--blue:#5080c0;
  --mono:'Share Tech Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;padding:10px 10px 80px;display:flex;flex-direction:column;align-items:center}
.app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:9px}

/* ═══ TOP BAR ═══════════════════════════════ */
.topbar{background:var(--bg3);border:1px solid var(--bd2);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:9px}
.dot{width:9px;height:9px;border-radius:50%;background:#3a3d50;flex-shrink:0;transition:background .3s}
.dot.connecting{background:var(--amber);animation:pulse .9s infinite}
.dot.connected{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.dev-nm{font-size:13px;font-weight:500;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dev-nm.on{color:var(--tx)}
.btn-conn{background:#1e3a5f;border:1px solid #2a5a9f;color:#6baed6;border-radius:8px;padding:7px 15px;font-size:12px;font-family:var(--sans);font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-conn:hover{background:#264a7a}
.btn-conn.on{background:#1a3a28;border-color:#2a7a4a;color:var(--green)}
.btn-conn:disabled{opacity:.4;cursor:not-allowed}

/* ═══ ANALYTE PILLS ═════════════════════════ */
.ana-scroll-wrap{position:relative}
.ana-pills{display:flex;gap:7px;overflow-x:auto;padding:4px 2px;scrollbar-width:none}
.ana-pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#3a3d50;background:#161920}
.pill.active{background:#0d1e14;border-color:#2a6a3a}
.pill.active .pill-name{color:var(--green)}
.pill-dot{width:7px;height:7px;border-radius:50%;background:#3a3d50;flex-shrink:0}
.pill-dot.ok{background:var(--green)}
.pill-name{font-size:13px;font-weight:500;color:var(--tx2)}
.pill.active .pill-dot.ok{box-shadow:0 0 5px rgba(76,175,114,.5)}

/* ═══ ANALYTE CARD ══════════════════════════ */
.ana-card{background:var(--bg3);border:1px solid var(--bd2);border-radius:14px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ac-left{}
.ac-name{font-size:22px;font-weight:600;color:var(--tx)}
.ac-detail{font-size:12px;color:var(--tx2);margin-top:2px}
.ac-right{text-align:right}
.ac-lbl{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.badge{display:inline-block;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500}
.b-ok  {background:#0d2a1a;color:var(--green);border:1px solid #1a5a2a}
.b-none{background:var(--bg2);color:#4a4d60;border:1px solid var(--bd)}

/* ═══ RESULT ════════════════════════════════ */
.result-card{background:#0b1c12;border:1px solid #1a4a2a;border-radius:14px;padding:14px 16px;display:none;flex-direction:column;gap:11px}
.result-card.show{display:flex}
.res-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.res-left{}
.res-lbl{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.res-val-row{display:flex;align-items:baseline;gap:7px}
.res-val{font-family:var(--mono);font-size:38px;letter-spacing:-.02em}
.res-unit{font-size:13px;color:#5a8a6a}
.res-ana{font-size:12px;color:var(--tx2);margin-top:3px}
.res-right{text-align:right;flex-shrink:0}
.seuil-lbl{font-size:11px;color:#3a5a48;margin-bottom:4px}
.sbadge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500}
.sb-ok  {background:#0d2a1a;color:var(--green);border:1px solid #1a5a2a}
.sb-warn{background:#2a1e0a;color:var(--amber);border:1px solid #5a3a0a}
.sb-bad {background:#2a0d0d;color:var(--red);  border:1px solid #5a1a1a}
.gps-row{display:flex;align-items:center;gap:9px}
.gps-txt{font-family:var(--mono);font-size:11px;color:var(--tx2);flex:1;word-break:break-all}
.btn-gps{background:#1a2840;border:1px solid #2a4070;color:#6090c0;border-radius:8px;padding:8px 13px;font-size:12px;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.btn-gps:hover{background:#203550}
.btn-gps.saved{background:#1a3a28;border-color:#2a5a3a;color:var(--green)}

/* ═══ TERMINAL ══════════════════════════════ */
.term-wrap{background:#070910;border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.term-bar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 13px;display:flex;align-items:center;justify-content:space-between}
.term-ttl{font-size:11px;color:#3a3d50;text-transform:uppercase;letter-spacing:.1em}
.btn-tg{font-size:11px;color:#3a3d50;background:none;border:none;cursor:pointer;font-family:var(--sans);text-transform:uppercase;letter-spacing:.05em}
.btn-tg:hover{color:var(--tx2)}
.terminal{font-family:var(--mono);font-size:12px;line-height:1.65;color:#c8a84a;padding:9px 12px;height:210px;overflow-y:auto;transition:height .2s}
.terminal.coll{height:0;padding:0}
.terminal::-webkit-scrollbar{width:3px}
.terminal::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}
.tl{word-break:break-all;margin-bottom:1px}
.tl.dim{color:#4a4730}.tl.ok{color:var(--green)}.tl.warn{color:#d07030}.tl.info{color:var(--blue)}.tl.res{color:#fff;font-weight:bold}
.cur{display:inline-block;width:7px;height:13px;background:#c8a84a;vertical-align:text-bottom;animation:pulse 1s step-end infinite}

/* ═══ COMMANDES ═════════════════════════════ */
.cmd-section{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:9px}
.cmd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.cmd{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .12s;font-family:var(--sans)}
.cmd:active:not([disabled]){transform:scale(.92)}
.cmd[disabled]{opacity:.3;cursor:not-allowed}
.ck{font-size:18px;font-weight:500;color:#b0b5c8;font-family:var(--mono)}
.cd{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em}
.cmd.g .ck{color:var(--green)}.cmd.g{background:#0d1e14;border-color:#1a4a2a}
.cmd.r .ck{color:var(--red)  }.cmd.r{background:#1a0d0d;border-color:#4a1a1a}
.btn-enter{width:100%;padding:12px;background:#131826;border:1px solid var(--bd2);border-radius:10px;color:#4a6090;font-size:13px;font-family:var(--sans);font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .15s}
.btn-enter.active{background:#1a2850;border-color:#3050a0;color:#80a8e0;animation:glow 1.5s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(80,120,200,0)}50%{box-shadow:0 0 14px 2px rgba(80,120,200,.2)}}
.btn-enter:active:not([disabled]){transform:scale(.98)}
.eico{font-size:19px}

/* ═══ ÉTALONNAGES (export/import) ═══════════ */
.calib-section{background:var(--bg3);border:1px solid var(--bd2);border-radius:14px;overflow:hidden}
.calib-bar{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.calib-ttl{font-size:13px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em}
.calib-body{padding:0 12px 13px;display:none;flex-direction:column;gap:8px}
.calib-body.open{display:flex}
.calib-status-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.cs-item{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.cs-dot{width:7px;height:7px;border-radius:50%;background:#3a3d50;flex-shrink:0}
.cs-dot.ok{background:var(--green)}
.cs-name{font-size:13px;font-weight:500;color:var(--tx)}
.cs-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.calib-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-calib{padding:11px;border-radius:9px;font-size:13px;font-family:var(--sans);font-weight:500;cursor:pointer;text-align:center;transition:all .15s;letter-spacing:.04em}
.btn-exp-cal{background:#1a2830;border:1px solid #2a4060;color:#6090c0}
.btn-exp-cal:hover{background:#203550}
.btn-imp-cal{background:#1a2a1a;border:1px solid #2a5a2a;color:var(--green)}
.btn-imp-cal:hover{background:#203520}
.btn-calib:disabled{opacity:.3;cursor:not-allowed}
.calib-progress{font-size:12px;color:var(--tx2);font-family:var(--mono);padding:4px 0;text-align:center;min-height:20px}

/* ═══ HISTORIQUE ════════════════════════════ */
.hist-section{background:var(--bg3);border:1px solid var(--bd2);border-radius:14px;overflow:hidden}
.hist-bar{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.hist-ttl{font-size:13px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em}
.hist-acts{display:flex;gap:7px}
.btn-hact{border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:var(--sans);letter-spacing:.04em;text-transform:uppercase;transition:all .15s}
.btn-csv{background:#1a2830;border:1px solid var(--bd2);color:#5090c0}
.btn-csv:hover{background:#203040}
.btn-clrh{background:#2a1515;border:1px solid #5a2020;color:#a05050}
.hist-list{max-height:280px;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:6px}
.hist-list.hidden{display:none}
.hist-item{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;display:grid;grid-template-columns:1fr auto;gap:2px 10px}
.hi-a{font-size:13px;font-weight:600;color:var(--tx)}
.hi-v{font-family:var(--mono);font-size:13px;text-align:right}
.hi-d{font-size:11px;color:var(--tx2)}
.hi-g{font-family:var(--mono);font-size:10px;color:#3a4a60;text-align:right}
.hist-empty{padding:16px;text-align:center;font-size:12px;color:#3a3d50}

/* ═══ NOTICE ════════════════════════════════ */
.notice{background:#1a1500;border:1px solid #3a3000;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.7;color:#906010;display:none}
.notice.show{display:block}
.notice strong{color:#c09020}
</style>
</head>
<body>
<div class="app">

<!-- Top bar -->
<div class="topbar">
  <div class="dot" id="dot"></div>
  <span class="dev-nm" id="devnm">AquaAnalyser</span>
  <button class="btn-conn" id="btnConn" onclick="toggleConnect()">Connecter</button>
</div>

<!-- Pastilles d'analytes -->
<div class="ana-scroll-wrap">
  <div class="ana-pills" id="pills"></div>
</div>

<!-- Carte analyte courant -->
<div class="ana-card">
  <div class="ac-left">
    <div class="ac-name" id="acName">—</div>
    <div class="ac-detail" id="acDetail">—</div>
  </div>
  <div class="ac-right">
    <div class="ac-lbl">Étalonnage</div>
    <div class="badge b-none" id="calibBadge">Non effectué</div>
  </div>
</div>

<!-- Résultat -->
<div class="result-card" id="resultCard">
  <div class="res-row">
    <div class="res-left">
      <div class="res-lbl">Mesure</div>
      <div class="res-val-row">
        <span class="res-val" id="rVal">—</span>
        <span class="res-unit" id="rUnit"></span>
      </div>
      <div class="res-ana" id="rAna"></div>
    </div>
    <div class="res-right">
      <div class="seuil-lbl" id="sLbl"></div>
      <div class="sbadge sb-ok" id="sBadge">—</div>
    </div>
  </div>
  <div class="gps-row">
    <div class="gps-txt" id="gpsTxt">GPS non capturé</div>
    <button class="btn-gps" id="btnGps" onclick="saveWithGPS()">📍 Enregistrer</button>
  </div>
</div>

<!-- Terminal -->
<div class="term-wrap">
  <div class="term-bar">
    <span class="term-ttl">Console</span>
    <button class="btn-tg" id="tBtn" onclick="toggleTerm()">Réduire</button>
  </div>
  <div class="terminal" id="term"></div>
</div>

<!-- Commandes -->
<div class="cmd-section">
  <div class="cmd-grid">
    <button class="cmd"   id="btnC" disabled onclick="send('C')"><span class="ck">C</span><span class="cd">Étalonner</span></button>
    <button class="cmd g" id="btnM" disabled onclick="send('M')"><span class="ck">M</span><span class="cd">Mesurer</span></button>
    <button class="cmd"   id="btnD" disabled onclick="send('D')"><span class="ck">D</span><span class="cd">Diag</span></button>
    <button class="cmd r" id="btnR" disabled onclick="send('R')"><span class="ck">R</span><span class="cd">Effacer</span></button>
  </div>
  <button class="btn-enter" id="btnEnter" disabled onclick="sendEnter()">
    <span class="eico">↵</span><span id="enterLbl">Entrée</span>
  </button>
  <button class="cmd" id="btnQ" disabled onclick="send('Q')"
          style="width:100%;padding:11px 8px;border-radius:10px;display:none;flex-direction:row;gap:10px;align-items:center;justify-content:center">
    <span class="ck" style="font-size:16px">Q</span>
    <span class="cd" style="font-size:12px;letter-spacing:.05em">Retour au menu</span>
  </button>
</div>

<!-- Étalonnages -->
<div class="calib-section">
  <div class="calib-bar" onclick="toggleCalib()">
    <span class="calib-ttl">📁 Étalonnages</span>
    <span style="font-size:12px;color:var(--tx2)" id="calibSummary">0 / 10</span>
  </div>
  <div class="calib-body" id="calibBody">
    <div class="calib-status-grid" id="calibGrid"></div>
    <div class="calib-btns">
      <button class="btn-calib btn-exp-cal" id="btnExpCal" onclick="exportCalibrations()" disabled>
        ⬇ Exporter JSON
      </button>
      <label class="btn-calib btn-imp-cal" id="lblImpCal">
        ⬆ Importer JSON
        <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importCalibrations(event)">
      </label>
    </div>
    <div class="calib-progress" id="calibProgress"></div>
  </div>
</div>

<!-- Historique -->
<div class="hist-section">
  <div class="hist-bar" onclick="toggleHist()">
    <span class="hist-ttl" id="histTtl">Historique (0)</span>
    <div class="hist-acts" onclick="event.stopPropagation()">
      <button class="btn-hact btn-csv" onclick="exportCSV()">CSV</button>
      <button class="btn-hact btn-clrh" onclick="clearHist()">Effacer</button>
    </div>
  </div>
  <div class="hist-list hidden" id="histList"></div>
</div>

<div class="notice" id="notice">
  <strong>Web Bluetooth non disponible.</strong><br>
  Utiliser <strong>Chrome sur Android</strong> (v56+) via HTTPS.<br>
  Firefox et Safari ne supportent pas Web Bluetooth.
</div>

</div><!-- .app -->

<script>
// ════════════════════════════════════════════════
// Définitions analytes
// ════════════════════════════════════════════════
const ANALYTES = [
  {idx:0,id:'no2', name:'NO2',       unit:'mg/L',n:9 },
  {idx:1,id:'ph',  name:'pH',        unit:'pH',  n:9 },
  {idx:2,id:'nh4', name:'NH4',       unit:'mg/L',n:9 },
  {idx:3,id:'no3', name:'NO3',       unit:'mg/L',n:10},
  {idx:4,id:'po4s',name:'PO4-sensi', unit:'mg/L',n:9 },
  {idx:5,id:'po4k',name:'PO4-koi',   unit:'mg/L',n:9 },
  {idx:6,id:'sio2',name:'SiO2',      unit:'mg/L',n:9 },
  {idx:7,id:'fe',  name:'Fe',        unit:'mg/L',n:9 },
  {idx:8,id:'cu',  name:'Cu',        unit:'mg/L',n:9 },
  {idx:9,id:'o2',  name:'O2',        unit:'mg/L',n:7 },
];

const THR = {
  no2:[0.1,0.5], nh4:[0.5,1.5], no3:[10,50],
  po4s:[0.5,1.0],po4k:[2.0,5.0],sio2:[2.0,4.0],
  fe:[0.3,1.0],  cu:[0.2,0.5],  o2:[5,8],       ph:null
};

// ════════════════════════════════════════════════
// BLE
// ════════════════════════════════════════════════
const NUS_SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_TX  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_RX  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

let bleDevice=null, rxChar=null, connected=false, rxBuf="";

// ════════════════════════════════════════════════
// État
// ════════════════════════════════════════════════
let calibSt   = Array(10).fill(0);
let curIdx    = 0;
let curResult = null;
let histOpen  = false;
let calibOpen = false;
let termOpen  = true;

// Export calibration collection
let expCollect = null;  // {analytes:[], current:'', pending:0}

// Import queue
let impQueue   = null;  // [{id,n,r,g,b,sr,sg,sb}, ...]
let impQIdx    = 0;
let impStep    = 0;     // 0=start,1-6=fields,7=end

// ════════════════════════════════════════════════
// Terminal
// ════════════════════════════════════════════════
const term = document.getElementById('term');

function tlog(t, c='') {
  if (!t.trim()) return;
  const d = document.createElement('div');
  d.className = 'tl ' + c;
  d.textContent = t;
  term.appendChild(d);
  term.scrollTop = term.scrollHeight;
}

function lcls(t) {
  if (/RESULT:|>> /.test(t))   return 'res';
  if (/OK|COMPLET|Sauvegard/.test(t)) return 'ok';
  if (/!!|Non-mono|Erreur/.test(t))   return 'warn';
  if (/^===|^\[C|^\[M|^---/.test(t)) return 'info';
  if (t.startsWith('  '))             return 'dim';
  return '';
}

function showQButton(visible) {
  const btn = document.getElementById('btnQ');
  btn.style.display = visible ? 'flex' : 'none';
}

function toggleTerm() {
  termOpen = !termOpen;
  term.classList.toggle('coll', !termOpen);
  document.getElementById('tBtn').textContent = termOpen ? 'Réduire' : 'Agrandir';
}

// ════════════════════════════════════════════════
// Parser BLE
// ════════════════════════════════════════════════
function onNotify(e) {
  rxBuf += new TextDecoder().decode(e.target.value);
  let nl;
  while ((nl = rxBuf.indexOf('\n')) !== -1) {
    const line = rxBuf.slice(0, nl).trimEnd();
    rxBuf = rxBuf.slice(nl + 1);
    if (line) parseLine(line);
  }
}

function parseLine(line) {
  // Signaux de contrôle
  if (line === 'WAIT_ENTER') {
    document.getElementById('btnEnter').classList.add('active');
    document.getElementById('enterLbl').textContent = 'Confirmer / Lancer acquisition';
    return;
  }
  if (line === 'MENU_READY') {
    document.getElementById('btnEnter').classList.remove('active');
    document.getElementById('enterLbl').textContent = 'Entrée';
    showQButton(false);  // retour au menu → masquer Q
    return;
  }

  // Infos analyte courant : ANA:idx:id:name:unit:n:calibOK
  if (line.startsWith('ANA:')) {
    const p = line.slice(4).split(':');
    if (p.length >= 6) {
      curIdx = parseInt(p[0]);
      updateAnaCard(p[2], p[3], p[4], p[5]==='1');
      refreshPills();
    }
    return;
  }

  // Statuts de calibration de tous les analytes
  if (line.startsWith('CALIB_ALL:')) {
    calibSt = line.slice(10).split(',').map(Number);
    refreshPills();
    refreshCalibGrid();
    return;
  }

  // Résultat de mesure : RESULT:val:unit:name
  if (line.startsWith('RESULT:')) {
    const p = line.slice(7).split(':');
    if (p.length >= 3) {
      curResult = { val:parseFloat(p[0]), unit:p[1], name:p[2], id:ANALYTES[curIdx]?.id||'' };
      showResult(curResult);
    }
    showQButton(true);  // après un résultat, proposer Q pour revenir au menu
    return;
  }

  // Afficher Q dès qu'on entre en mode MESURE ou CALIBRATION
  if (line.includes('--- MESURE') || line.includes('--- ETALONNAGE')) {
    showQButton(true);
  }

  // ── Export calibration depuis ESP32 ──
  if (line === 'EXP_BEGIN_ALL') {
    expCollect = { data:{}, pending:true };
    setCalibProgress('Réception des étalonnages...');
    return;
  }
  if (line.startsWith('EXP_START:')) {
    const p = line.slice(10).split(':');
    if (expCollect && p.length >= 2) {
      expCollect.current = p[0];
      expCollect.data[p[0]] = { id:p[0], n:parseInt(p[1]) };
    }
    return;
  }
  if (line.startsWith('EXP_R:')  || line.startsWith('EXP_G:')  || line.startsWith('EXP_B:') ||
      line.startsWith('EXP_SR:') || line.startsWith('EXP_SG:') || line.startsWith('EXP_SB:')) {
    if (expCollect && expCollect.current) {
      const colon = line.indexOf(':');
      const tag   = line.slice(0, colon).replace('EXP_','').toLowerCase();
      const id2   = line.slice(colon+1, line.indexOf(':',colon+1));
      const vals  = line.slice(line.indexOf(':',colon+1)+1).split(',').map(parseFloat);
      expCollect.data[expCollect.current][tag] = vals;
    }
    return;
  }
  if (line.startsWith('EXP_END:')) { /* analyte terminé, on attend EXP_DONE_ALL */ return; }
  if (line === 'EXP_DONE_ALL') {
    if (expCollect) { finalizeExport(); expCollect = null; }
    return;
  }
  if (line === 'EXP_NONE') {
    setCalibProgress('Aucun étalonnage à exporter.');
    return;
  }

  // ── Acquittements import ──
  if (line.startsWith('IMP_ACK:')) {
    handleImportAck(line.slice(8));
    return;
  }
  if (line.startsWith('IMP_OK:')) {
    const id = line.slice(7);
    tlog('Étalonnage importé : ' + id, 'ok');
    setCalibProgress(`Importé : ${id}`);
    sendNextImportStep();  // passer à l'analyte suivant
    return;
  }
  if (line.startsWith('IMP_ERR:')) {
    tlog('Erreur import : ' + line.slice(8), 'warn');
    setCalibProgress('Erreur import ! Voir console.');
    impQueue = null; impQIdx = 0;
    return;
  }

  tlog(line, lcls(line));
}

// ════════════════════════════════════════════════
// Résultat + GPS
// ════════════════════════════════════════════════
function showResult(r) {
  const card = document.getElementById('resultCard');
  card.classList.add('show');
  document.getElementById('rVal').textContent  = r.val.toFixed(4);
  document.getElementById('rUnit').textContent = r.unit;
  document.getElementById('rAna').textContent  = r.name;
  document.getElementById('rVal').style.color  = vColor(r);

  const thr = THR[r.id];
  const sb  = document.getElementById('sBadge');
  const sl  = document.getElementById('sLbl');
  if (thr) {
    sl.textContent = `Seuil : ${thr[0]} / ${thr[1]} ${r.unit}`;
    if      (r.val <= thr[0]) { sb.textContent='Normal';   sb.className='sbadge sb-ok'; }
    else if (r.val <= thr[1]) { sb.textContent='Élevé';    sb.className='sbadge sb-warn'; }
    else                      { sb.textContent='Dépassé';  sb.className='sbadge sb-bad'; }
  } else if (r.id === 'ph') {
    sl.textContent = 'pH optimal 7.8–8.4';
    const v = r.val;
    if      (v>=7.8&&v<=8.4) { sb.textContent='Optimal';    sb.className='sbadge sb-ok'; }
    else if (v>=7.4&&v<=9.0) { sb.textContent='Acceptable'; sb.className='sbadge sb-warn'; }
    else                      { sb.textContent='Hors plage'; sb.className='sbadge sb-bad'; }
  }

  document.getElementById('gpsTxt').textContent = 'GPS non capturé';
  const bg = document.getElementById('btnGps');
  bg.textContent = '📍 Enregistrer'; bg.className = 'btn-gps';
  bg.disabled = false; bg.onclick = saveWithGPS;
}

function vColor(r) {
  const t = THR[r.id];
  if (!t) return '#a0c0e8';
  if (r.val <= t[0]) return '#4caf72';
  if (r.val <= t[1]) return '#e8a020';
  return '#e05040';
}

async function saveWithGPS() {
  const btn = document.getElementById('btnGps');
  btn.textContent = '⏳ GPS...'; btn.disabled = true;
  let lat=null, lon=null, acc=null;
  try {
    const pos = await new Promise((res,rej) =>
      navigator.geolocation
        ? navigator.geolocation.getCurrentPosition(res, rej, {timeout:12000, enableHighAccuracy:true})
        : rej('no_geo')
    );
    lat = pos.coords.latitude; lon = pos.coords.longitude; acc = Math.round(pos.coords.accuracy);
    document.getElementById('gpsTxt').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)} (±${acc}m)`;
  } catch {
    document.getElementById('gpsTxt').textContent = 'GPS indisponible';
  }
  if (curResult) saveMeas(curResult, lat, lon, acc);
  btn.textContent = '✓ Sauvegardé'; btn.className = 'btn-gps saved';
  btn.disabled = false; btn.onclick = null;
  refreshHist();
}

// ════════════════════════════════════════════════
// Export étalonnages → JSON
// ════════════════════════════════════════════════
async function exportCalibrations() {
  if (!connected) return;
  expCollect = { data:{}, pending:true };
  setCalibProgress('Demande à l\'ESP32...');
  await send('EXPALL');
  // La réception continue via parseLine / EXP_* handlers
  // finalizeExport() sera appelé à EXP_DONE_ALL
}

function finalizeExport() {
  const calibrations = Object.values(expCollect.data).map(c => {
    const ana = ANALYTES.find(a => a.id === c.id);
    return {
      id:   c.id,
      name: ana?.name || c.id,
      unit: ana?.unit || '',
      n:    c.n,
      r:  c.r  || [],
      g:  c.g  || [],
      b:  c.b  || [],
      sr: c.sr || [],
      sg: c.sg || [],
      sb: c.sb || [],
    };
  });

  const json = JSON.stringify({
    device:   'AquaAnalyser',
    exported: new Date().toISOString(),
    calibrations
  }, null, 2);

  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aqua_calibrations_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);

  const n = calibrations.length;
  setCalibProgress(`✓ ${n} étalonnage${n>1?'s':''} exporté${n>1?'s':''}`);
  tlog(`Export JSON : ${n} étalonnage(s)`, 'ok');
}

// ════════════════════════════════════════════════
// Import étalonnages ← JSON
// ════════════════════════════════════════════════
function importCalibrations(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  if (!connected) { setCalibProgress('Connectez d\'abord l\'ESP32.'); return; }

  const reader = new FileReader();
  reader.onload = async ev => {
    let json;
    try { json = JSON.parse(ev.target.result); }
    catch { setCalibProgress('Fichier JSON invalide.'); return; }

    if (!json.calibrations || !json.calibrations.length) {
      setCalibProgress('Aucun étalonnage dans ce fichier.');
      return;
    }

    impQueue = json.calibrations.filter(c =>
      c.id && c.n > 0 && c.r?.length && c.g?.length && c.b?.length
    );
    impQIdx = 0;
    impStep = 0;

    if (!impQueue.length) { setCalibProgress('Données invalides dans le fichier.'); return; }
    setCalibProgress(`Import de ${impQueue.length} étalonnage(s)...`);
    tlog(`Import JSON : ${impQueue.length} étalonnage(s)`, 'info');
    await sendImportStart();
  };
  reader.readAsText(file);
}

async function sendImportStart() {
  if (!impQueue || impQIdx >= impQueue.length) {
    setCalibProgress(`✓ Import terminé (${impQIdx} étalonnage${impQIdx>1?'s':''})`);
    impQueue = null; impQIdx = 0;
    return;
  }
  const c = impQueue[impQIdx];
  impStep = 0;
  setCalibProgress(`Envoi ${c.id} (${impQIdx+1}/${impQueue.length})...`);
  await send(`IMP_START:${c.id}:${c.n}`);
}

async function handleImportAck(ack) {
  if (!impQueue || impQIdx >= impQueue.length) return;
  const c = impQueue[impQIdx];
  const fields = [
    ['IMP_R',  c.r],
    ['IMP_G',  c.g],
    ['IMP_B',  c.b],
    ['IMP_SR', c.sr],
    ['IMP_SG', c.sg],
    ['IMP_SB', c.sb],
  ];
  if (ack === 'start' || ack.startsWith('f')) {
    const fi = ack === 'start' ? 0 : parseInt(ack.slice(1)) + 1;
    if (fi < 6) {
      const [tag, arr] = fields[fi];
      await send(`${tag}:${arr.slice(0,c.n).map(v=>v.toFixed(2)).join(',')}`);
    } else {
      await send('IMP_END');
    }
  }
}

async function sendNextImportStep() {
  impQIdx++;
  await new Promise(r => setTimeout(r, 100));
  await sendImportStart();
}

// ════════════════════════════════════════════════
// UI — Pastilles & cartes
// ════════════════════════════════════════════════
function buildPills() {
  document.getElementById('pills').innerHTML = ANALYTES.map(a => `
    <div class="pill${a.idx===curIdx?' active':''}" id="pill${a.idx}" onclick="selectAnalyte('${a.id}')">
      <div class="pill-dot${calibSt[a.idx]?' ok':''}" id="pd${a.idx}"></div>
      <span class="pill-name">${a.name}</span>
    </div>`).join('');
  scrollActivePill();
}

function refreshPills() {
  ANALYTES.forEach(a => {
    const p  = document.getElementById('pill' + a.idx);
    const pd = document.getElementById('pd'   + a.idx);
    if (p)  p.className  = 'pill' + (a.idx===curIdx ? ' active' : '');
    if (pd) pd.className = 'pill-dot' + (calibSt[a.idx] ? ' ok' : '');
  });
  scrollActivePill();
  updateCalibSummary();
}

function scrollActivePill() {
  const el = document.getElementById('pill' + curIdx);
  if (el) el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

function updateAnaCard(name, unit, n, isCalib) {
  document.getElementById('acName').textContent   = name;
  document.getElementById('acDetail').textContent = `${unit} · ${n} valeurs`;
  const b = document.getElementById('calibBadge');
  b.textContent = isCalib ? 'Effectué ✓' : 'Non effectué';
  b.className   = 'badge ' + (isCalib ? 'b-ok' : 'b-none');
}

function refreshCalibGrid() {
  document.getElementById('calibGrid').innerHTML = ANALYTES.map(a => `
    <div class="cs-item">
      <div class="cs-dot${calibSt[a.idx]?' ok':''}" id="cd${a.idx}"></div>
      <div>
        <div class="cs-name">${a.name}</div>
        <div class="cs-sub">${calibSt[a.idx]?'Étalonné':'—'}</div>
      </div>
    </div>`).join('');
}

function updateCalibSummary() {
  const n = calibSt.filter(Boolean).length;
  document.getElementById('calibSummary').textContent = `${n} / ${ANALYTES.length}`;
  document.getElementById('btnExpCal').disabled = (n===0 || !connected);
}

function setCalibProgress(msg) {
  document.getElementById('calibProgress').textContent = msg;
}

async function selectAnalyte(id) {
  if (!connected) return;
  await send('SEL:' + id);
}

// ════════════════════════════════════════════════
// Toggles
// ════════════════════════════════════════════════
function toggleCalib() {
  calibOpen = !calibOpen;
  document.getElementById('calibBody').classList.toggle('open', calibOpen);
  if (calibOpen) { refreshCalibGrid(); updateCalibSummary(); }
}

function toggleHist() {
  histOpen = !histOpen;
  document.getElementById('histList').classList.toggle('hidden', !histOpen);
  if (histOpen) refreshHist();
}

// ════════════════════════════════════════════════
// Historique (localStorage)
// ════════════════════════════════════════════════
const LS = 'aquaanalyser_v1';
function getHist() { try { return JSON.parse(localStorage.getItem(LS)||'[]'); } catch { return []; } }

function saveMeas(r, lat, lon, acc) {
  const h = getHist();
  h.unshift({date:new Date().toISOString(),analyte:r.name,id:r.id,val:r.val,unit:r.unit,lat,lon,acc});
  localStorage.setItem(LS, JSON.stringify(h.slice(0,500)));
}

function refreshHist() {
  const h = getHist();
  document.getElementById('histTtl').textContent = `Historique (${h.length})`;
  const list = document.getElementById('histList');
  if (!h.length) { list.innerHTML='<div class="hist-empty">Aucune mesure enregistrée</div>'; return; }
  list.innerHTML = h.slice(0,60).map(m => {
    const d   = new Date(m.date);
    const dt  = d.toLocaleDateString('fr')+' '+d.toLocaleTimeString('fr');
    const gps = m.lat ? `${m.lat.toFixed(5)}, ${m.lon.toFixed(5)}` : '—';
    const col = m.val < 0 ? '#6a6f88' : '#c8cdd8';
    const vt  = m.val < 0 ? 'Erreur' : `${m.val.toFixed(4)} ${m.unit}`;
    return `<div class="hist-item">
      <span class="hi-a">${m.analyte}</span>
      <span class="hi-v" style="color:${col}">${vt}</span>
      <span class="hi-d">${dt}</span>
      <span class="hi-g">${gps}</span>
    </div>`;
  }).join('');
}

function clearHist() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  localStorage.removeItem(LS); refreshHist();
}

function exportCSV() {
  const h = getHist();
  if (!h.length) { alert('Aucune mesure.'); return; }
  const hdr = 'Date,Analyte,ID,Valeur,Unité,Latitude,Longitude,Précision_m';
  const rows = h.map(m =>
    `"${m.date}","${m.analyte}","${m.id}",${m.val},"${m.unit}",${m.lat??''},${m.lon??''},${m.acc??''}`
  );
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([hdr+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download = `aqua_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ════════════════════════════════════════════════
// BLE connect / send
// ════════════════════════════════════════════════
async function toggleConnect() {
  if (connected) { bleDevice?.gatt?.disconnect(); return; }
  if (!navigator.bluetooth) { document.getElementById('notice').classList.add('show'); return; }
  setConn('connecting');
  try {
    bleDevice = await navigator.bluetooth.requestDevice({filters:[{services:[NUS_SVC]}]});
    bleDevice.addEventListener('gattserverdisconnected', () => {
      setConn('disconnected'); rxChar=null;
      tlog('Déconnecté.','warn');
    });
    const srv  = await bleDevice.gatt.connect();
    const svc  = await srv.getPrimaryService(NUS_SVC);
    const tx   = await svc.getCharacteristic(NUS_TX);
    rxChar     = await svc.getCharacteristic(NUS_RX);
    await tx.startNotifications();
    tx.addEventListener('characteristicvaluechanged', onNotify);
    setConn('connected', bleDevice.name || 'AquaAnalyser');
    tlog('Connecté — '+(bleDevice.name||'AquaAnalyser'),'ok');
    await send('\n');
  } catch(e) { setConn('disconnected'); tlog('Erreur : '+e.message,'warn'); }
}

async function send(cmd) {
  if (!rxChar || !connected) return;
  try {
    await rxChar.writeValueWithoutResponse(new TextEncoder().encode(cmd+'\n'));
  } catch(e) { tlog('Erreur envoi : '+e.message,'warn'); }
}

async function sendEnter() {
  document.getElementById('btnEnter').classList.remove('active');
  document.getElementById('enterLbl').textContent = 'Entrée';
  await send('\r');
}

function setConn(state, name) {
  connected = (state==='connected');
  document.getElementById('dot').className = 'dot ' + state;
  const dn  = document.getElementById('devnm');
  const btn = document.getElementById('btnConn');
  const ids = ['btnC','btnM','btnD','btnR','btnEnter','btnQ'];
  if (state==='connected') {
    dn.textContent = name||'AquaAnalyser'; dn.className='dev-nm on';
    btn.textContent='Déconnecter'; btn.className='btn-conn on'; btn.disabled=false;
    ids.forEach(id=>document.getElementById(id).removeAttribute('disabled'));
    const c=document.createElement('span'); c.className='cur'; c.id='tcur';
    term.appendChild(c); term.scrollTop=term.scrollHeight;
  } else {
    dn.textContent = state==='connecting'?'Connexion...':'AquaAnalyser'; dn.className='dev-nm';
    btn.textContent = state==='connecting'?'...':'Connecter';
    btn.className='btn-conn'; btn.disabled=(state==='connecting');
    ids.forEach(id=>document.getElementById(id).setAttribute('disabled',''));
    document.getElementById('btnEnter').classList.remove('active');
    document.getElementById('enterLbl').textContent='Entrée';
    showQButton(false);
    const c=document.getElementById('tcur'); if(c)c.remove();
    document.getElementById('btnExpCal').disabled=true;
  }
}

// Init

buildPills();
refreshCalibGrid();
refreshHist();
updateAnaCard('—','—','—',false);
if (!navigator.bluetooth) tlog('Web Bluetooth non détecté — Chrome Android requis (HTTPS).','warn');
else { tlog('AquaAnalyser — prêt.','info'); tlog('Connectez l\'ESP32 via le bouton.','dim'); }
